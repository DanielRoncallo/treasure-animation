<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Treasure Awaits...</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* ── CHANGE THE SECRET CODE HERE ── */
  /* Edit the JS variable `SECRET_CODE` near the bottom of this file */

  :root {
    --gold: #f5c542;
    --gold-dark: #b8860b;
    --gold-light: #ffe97a;
    --dark: #0d0a05;
    --deep: #1a1206;
    --wood: #6b3a1f;
    --wood-light: #8b5a2b;
    --parchment: #f4e4b0;
    --red-gem: #c0392b;
    --glow: rgba(245, 197, 66, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 30%, #2a1a00 0%, #0d0a05 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Text', serif;
    overflow: hidden;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; }
    to   { opacity: 0.9; }
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    animation: float var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 20px;
    max-width: 440px;
    width: 100%;
  }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: clamp(1rem, 4vw, 1.4rem);
    text-align: center;
    text-shadow: 0 0 30px var(--glow), 0 2px 4px #000;
    letter-spacing: 0.04em;
    animation: fadeDown 1s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── CHEST SVG WRAPPER ─── */
  .chest-wrap {
    position: relative;
    width: 220px;
    height: 200px;
    animation: chestFloat 3s ease-in-out infinite;
    cursor: default;
    filter: drop-shadow(0 20px 40px rgba(245,197,66,0.25));
  }
  @keyframes chestFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  .chest-svg { width: 100%; height: 100%; }

  /* Lid opens on unlock */
  .chest-lid {
    transform-origin: 50% 95%;
    transition: transform 1.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .chest-wrap.open .chest-lid {
    transform: rotate(-110deg) translateY(4px);
  }

  /* Glow inside chest */
  .chest-glow {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 40px;
    background: radial-gradient(ellipse, var(--gold-light) 0%, transparent 70%);
    opacity: 0;
    border-radius: 50%;
    transition: opacity 1s ease 0.5s;
    pointer-events: none;
  }
  .chest-wrap.open .chest-glow { opacity: 1; }

  /* ─── LOCK PANEL ─── */
  .lock-panel {
    background: linear-gradient(145deg, #1e1408, #120e04);
    border: 1.5px solid var(--gold-dark);
    border-radius: 16px;
    padding: 28px 32px 24px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(245,197,66,0.1);
    animation: fadeUp 1s ease 0.3s both;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lock-label {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Code dots display */
  .code-display {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .code-dot {
    width: 14px; height: 14px;
    border: 2px solid var(--gold-dark);
    border-radius: 50%;
    background: transparent;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .code-dot.filled {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  /* Number pad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 260px;
  }
  .key {
    aspect-ratio: 1;
    border: 1.5px solid var(--gold-dark);
    background: linear-gradient(145deg, #2a1e0a, #1a1206);
    color: var(--parchment);
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .key::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--gold-light), transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .key:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
  .key:active { transform: scale(0.93); }
  .key:active::after { opacity: 0.15; }
  .key.delete { font-size: 1.3rem; color: var(--red-gem); border-color: #6b2020; }
  .key.delete:hover { border-color: var(--red-gem); }
  .key.zero { grid-column: 2; }

  /* Error shake */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
  .code-dot.error { border-color: var(--red-gem) !important; background: var(--red-gem) !important; box-shadow: 0 0 8px var(--red-gem) !important; }

  /* ─── CONGRATS PANEL ─── */
  .congrats-panel {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(30,20,5,0.97) 0%, rgba(10,8,2,0.99) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease 0.8s;
    gap: 20px;
    padding: 30px;
    text-align: center;
  }
  .congrats-panel.show {
    opacity: 1;
    pointer-events: all;
  }

  .congrats-title {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: clamp(1.6rem, 7vw, 2.8rem);
    text-shadow: 0 0 40px var(--gold), 0 0 80px rgba(245,197,66,0.4);
    animation: none;
  }
  .congrats-panel.show .congrats-title {
    animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 1s both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  .congrats-msg {
    color: var(--parchment);
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-style: italic;
    max-width: 340px;
    opacity: 0;
    line-height: 1.6;
  }
  .congrats-panel.show .congrats-msg {
    animation: fadeUp 0.8s ease 1.5s both;
  }

  .congrats-emoji {
    font-size: 3.5rem;
    opacity: 0;
  }
  .congrats-panel.show .congrats-emoji {
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 2s both;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -20px;
    border-radius: 2px;
    animation: confettiFall var(--d) ease var(--delay) forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes confettiFall {
    0%   { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; top: -20px; }
    100% { transform: translateX(var(--drift)) rotate(720deg) scale(0.5); opacity: 0; top: 110vh; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <h1>A Treasure Awaits You</h1>

  <!-- CHEST -->
  <div class="chest-wrap" id="chest">
    <div class="chest-glow"></div>
    <svg class="chest-svg" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow -->
      <ellipse cx="110" cy="192" rx="80" ry="8" fill="rgba(0,0,0,0.5)"/>

      <!-- BASE -->
      <rect x="20" y="100" width="180" height="85" rx="10" ry="10" fill="#5c2e0a"/>
      <rect x="20" y="100" width="180" height="85" rx="10" ry="10" fill="url(#woodBase)"/>
      <!-- Horizontal bands -->
      <rect x="20" y="128" width="180" height="12" rx="3" fill="#3d1e06" opacity="0.5"/>
      <rect x="20" y="155" width="180" height="12" rx="3" fill="#3d1e06" opacity="0.5"/>
      <!-- Gold trim bands -->
      <rect x="18" y="126" width="184" height="5" rx="2" fill="url(#goldGrad)"/>
      <rect x="18" y="153" width="184" height="5" rx="2" fill="url(#goldGrad)"/>
      <!-- Corner bolts base -->
      <circle cx="38" cy="135" r="6" fill="url(#goldGrad)"/>
      <circle cx="182" cy="135" r="6" fill="url(#goldGrad)"/>
      <circle cx="38" cy="162" r="6" fill="url(#goldGrad)"/>
      <circle cx="182" cy="162" r="6" fill="url(#goldGrad)"/>

      <!-- LID GROUP (animated) -->
      <g class="chest-lid" id="chestLid">
        <!-- Lid body -->
        <rect x="20" y="55" width="180" height="50" rx="10" ry="10" fill="#6b3a1f"/>
        <rect x="20" y="55" width="180" height="50" rx="10" ry="10" fill="url(#woodLid)"/>
        <!-- Lid arc top -->
        <path d="M20,75 Q110,30 200,75 L200,60 Q110,10 20,60 Z" fill="#7a4222" opacity="0.9"/>
        <!-- Lid gold trim -->
        <rect x="18" y="96" width="184" height="5" rx="2" fill="url(#goldGrad)"/>
        <path d="M22,75 Q110,33 198,75" stroke="url(#goldGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- Corner bolts lid -->
        <circle cx="38" cy="85" r="6" fill="url(#goldGrad)"/>
        <circle cx="182" cy="85" r="6" fill="url(#goldGrad)"/>
        <!-- Latch plate -->
        <rect x="90" y="93" width="40" height="22" rx="5" fill="url(#goldGrad)"/>
        <rect x="95" y="98" width="30" height="12" rx="3" fill="#b8860b"/>
        <!-- Lock icon -->
        <path d="M103,104 Q110,98 117,104 L117,110 L103,110 Z" fill="#8b6914" stroke="#5a4010" stroke-width="1"/>
        <rect x="106" y="108" width="8" height="6" rx="2" fill="#8b6914" stroke="#5a4010" stroke-width="1"/>
        <circle cx="110" cy="111" r="1.5" fill="#5a4010"/>
      </g>

      <!-- Treasure glow (inside) -->
      <ellipse cx="110" cy="155" rx="55" ry="18" fill="url(#glowInside)" opacity="0" id="innerGlow"/>

      <defs>
        <linearGradient id="woodBase" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7a4222"/>
          <stop offset="100%" stop-color="#4a200a"/>
        </linearGradient>
        <linearGradient id="woodLid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8b5a2b"/>
          <stop offset="100%" stop-color="#5c2e0a"/>
        </linearGradient>
        <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe97a"/>
          <stop offset="50%" stop-color="#f5c542"/>
          <stop offset="100%" stop-color="#b8860b"/>
        </linearGradient>
        <radialGradient id="glowInside" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe97a" stop-opacity="1"/>
          <stop offset="100%" stop-color="#f5c542" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- LOCK PANEL -->
  <div class="lock-panel" id="lockPanel">
    <div class="lock-label">⚔ Enter the Secret Code ⚔</div>
    <div class="code-display" id="codeDisplay"></div>
    <div class="numpad" id="numpad"></div>
  </div>
</div>

<!-- CONGRATS OVERLAY -->
<div class="congrats-panel" id="congratsPanel">
  <div class="congrats-emoji">🏆</div>
  <div class="congrats-title">Congratulations!</div>
  <div class="congrats-msg" id="congratsMsg">
    You've unlocked the treasure!<br>You are truly worthy, brave adventurer.
  </div>
</div>

<script>
/* ════════════════════════════════════════
   ★  CUSTOMIZE THESE VALUES  ★
   ════════════════════════════════════════ */
const SECRET_CODE = "12345678";      // ← Change this to your secret code
const CODE_LENGTH = 8;               // ← Must match the length of SECRET_CODE
const CONGRATS_MESSAGE = `You've unlocked the treasure!<br>You are truly worthy, brave adventurer.`;
/* ════════════════════════════════════════ */

let entered = "";

// ── Build stars ──
const starsEl = document.getElementById("stars");
for (let i = 0; i < 80; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --d:${(Math.random()*3+1.5).toFixed(1)}s;
    animation-delay:${(Math.random()*4).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ── Build particles ──
const particlesEl = document.getElementById("particles");
for (let i = 0; i < 18; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.cssText = `left:${Math.random()*100}%; --d:${(Math.random()*8+6).toFixed(1)}s; animation-delay:${(Math.random()*8).toFixed(1)}s;`;
  particlesEl.appendChild(p);
}

// ── Build code display dots ──
const display = document.getElementById("codeDisplay");
for (let i = 0; i < CODE_LENGTH; i++) {
  const d = document.createElement("div");
  d.className = "code-dot";
  d.id = `dot-${i}`;
  display.appendChild(d);
}

// ── Build numpad ──
const pad = document.getElementById("numpad");
const keys = [1,2,3,4,5,6,7,8,9,"⌫",0,"✓"];
keys.forEach(k => {
  const btn = document.createElement("button");
  btn.className = "key";
  if (k === "⌫") btn.classList.add("delete");
  if (k === 0)   btn.classList.add("zero");
  btn.textContent = k;
  btn.addEventListener("click", () => handleKey(k));
  pad.appendChild(btn);
});

function updateDots() {
  for (let i = 0; i < CODE_LENGTH; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.classList.toggle("filled", i < entered.length);
    dot.classList.remove("error");
  }
}

function handleKey(k) {
  if (k === "⌫") {
    entered = entered.slice(0, -1);
    updateDots();
    return;
  }
  if (k === "✓") {
    checkCode();
    return;
  }
  if (entered.length < CODE_LENGTH) {
    entered += k;
    updateDots();
    if (entered.length === CODE_LENGTH) {
      // Auto-check after full input
      setTimeout(checkCode, 300);
    }
  }
}

function checkCode() {
  if (entered === SECRET_CODE) {
    unlock();
  } else {
    // Shake + red flash
    const dots = document.querySelectorAll(".code-dot");
    dots.forEach(d => { d.classList.add("error"); });
    display.classList.add("shake");
    setTimeout(() => {
      display.classList.remove("shake");
      dots.forEach(d => d.classList.remove("error"));
      entered = "";
      updateDots();
    }, 600);
  }
}

function unlock() {
  // Open chest
  const chest = document.getElementById("chest");
  chest.classList.add("open");
  chest.style.animation = "none"; // stop float while opening
  document.getElementById("innerGlow").style.opacity = "1";
  document.getElementById("innerGlow").style.transition = "opacity 1.2s ease 0.5s";

  // Hide lock panel
  const panel = document.getElementById("lockPanel");
  panel.style.opacity = "0";
  panel.style.transform = "translateY(20px)";
  panel.style.pointerEvents = "none";

  // Show congrats
  const cp = document.getElementById("congratsPanel");
  document.getElementById("congratsMsg").innerHTML = CONGRATS_MESSAGE;
  cp.classList.add("show");

  // Confetti
  setTimeout(spawnConfetti, 900);
}

function spawnConfetti() {
  const colors = ["#f5c542","#ffe97a","#e74c3c","#2ecc71","#3498db","#9b59b6","#fff","#ff6b35"];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const c = document.createElement("div");
      c.className = "confetti-piece";
      c.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${Math.random()*10+6}px;
        height:${Math.random()*10+6}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        --d:${(Math.random()*2+2.5).toFixed(1)}s;
        --delay:0s;
        --drift:${(Math.random()*160-80).toFixed(0)}px;
        transform: rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 30);
  }
}

// Also support keyboard input
document.addEventListener("keydown", e => {
  if (e.key >= "0" && e.key <= "9") handleKey(parseInt(e.key));
  if (e.key === "Backspace") handleKey("⌫");
  if (e.key === "Enter") handleKey("✓");
});
</script>
</body>
</html>
